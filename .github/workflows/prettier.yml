name: Prettier

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  prettier:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check formatting
        run: npx prettier@latest . --check
