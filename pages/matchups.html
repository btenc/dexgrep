<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Calculate a breakdown of your Pokémon team's weaknesses and resistances. Free and open source."
    />
    <title>DEXGREP: Team Type Matchups</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <noscript
      >This site unfortunately relies heavily on JavaScript. Please enable it to
      use DEXGREP.</noscript
    >
    <div id="site-header"></div>

    <fieldset>
      <legend>
        GENERATION MECHANICS (applies historical types, abilities, and type
        chart)
      </legend>
      <select id="gen-select" onchange="onMatchupsGenChange(this.value)">
        <option value="">none</option>
        <option value="1">gen 1 (RBY)</option>
        <option value="2">gen 2 (GSC)</option>
        <option value="3">gen 3 (RSE)</option>
        <option value="4">gen 4 (DPP)</option>
        <option value="5">gen 5 (BW)</option>
        <option value="6">gen 6 (XY)</option>
        <option value="7">gen 7 (SM)</option>
        <option value="8">gen 8 (SwSh)</option>
        <option value="9">gen 9 (SV)</option>
      </select>
    </fieldset>

    <fieldset>
      <legend>ENTER TEAM</legend>
      <div id="team-slots"></div>
    </fieldset>

    <div>
      <button onclick="calculateMatchups()" data-requires-data>
        <b>calculate [enter]</b>
      </button>
      <button onclick="resetMatchups()">reset</button>
      <button onclick="loadExample()">example</button>
      <button onclick="refreshData()">refresh data</button>
      <button onclick="shareCurrentURL(this)">share</button>
    </div>

    <p>
      <small
        >ability awareness: matchup modifying abilities are NOT considered by
        default, unless entered.</small
      >
    </p>

    <div id="matchups-grid"></div>

    <div id="site-footer"></div>

    <script src="../js/shared.js"></script>
    <script src="../js/matchups.js"></script>
    <script
      data-goatcounter="https://dexgrep.goatcounter.com/count"
      async
      src="//gc.zgo.at/count.js"
    ></script>
  </body>
</html>
